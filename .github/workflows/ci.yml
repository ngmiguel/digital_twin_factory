name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  DATABASE_URL: postgresql+asyncpg://dtf:dtf@localhost:5432/digital_twin_factory_test
  REDIS_URL: redis://localhost:6379/15
  JWT_SECRET_KEY: test-secret-key
  CELERY_BROKER_URL: redis://localhost:6379/14
  CELERY_RESULT_BACKEND: redis://localhost:6379/13
  ENVIRONMENT: test

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy src/

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[test]"
      - run: pytest tests/unit/ -v --cov=src --cov-report=term-missing

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install bandit pip-audit
      - run: bandit -r src/ -ll
      - run: pip install -e .
      - run: pip-audit

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test-unit, security]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: digital_twin_factory_test
          POSTGRES_USER: dtf
          POSTGRES_PASSWORD: dtf
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[test]"
      - run: python -m alembic upgrade head
      - run: pytest tests/integration/ -v -m integration

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[test]"
      - run: docker compose -f docker-compose.ci.yml up -d --wait
      - run: pytest tests/e2e/ -v -m e2e
        env:
          E2E_BASE_URL: http://localhost:8000
      - run: docker compose -f docker-compose.ci.yml down -v

  build:
    name: Build API Image
    runs-on: ubuntu-latest
    needs: test-e2e
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: false
          tags: digital-twin-factory-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
