# E2E stack for CI — API + PostgreSQL + Redis

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: digital_twin_factory_test
      POSTGRES_USER: dtf
      POSTGRES_PASSWORD: dtf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtf -d digital_twin_factory_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://dtf:dtf@postgres:5432/digital_twin_factory_test
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: test-secret-key
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
      API_RELOAD: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.presentation.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
